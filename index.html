// ═══ SCORING ENGINE ═══
function score(ans){
  const ord=["u150","150t300","300t500","500t800","o800"];
  const bi=ord.indexOf(ans.budget);
  return V.map(v=>{
    let s=0,r=[];const vi=ord.indexOf(v.bg);
    if(v.bg===ans.budget){s+=30;}
    else if(ans.cond!=="new"&&vi===bi+1){s+=10;r.push("Stretch budget \u2014 used price may fit");}
    else if(ans.cond!=="new"&&vi===bi-1){s+=15;r.push("Under budget \u2014 great value used");}
    else return{...v,sc:-1,r:[]};

    if(v.us.includes(ans.use)){s+=25;r.push("Matches your primary use");}
    else if(ans.use==="first_car"&&v.us.includes("commute")){s+=15;r.push("Good commuter for first car");}
    else if(ans.use==="adventure"&&v.tr!=="city"){s+=10;}
    else s-=10;

    if(v.tr===ans.terrain){s+=15;r.push("Suited to your driving conditions");}
    else if(v.tr==="mixed"&&ans.terrain==="city")s+=8;
    else if(v.tr==="offroad"&&ans.terrain==="mixed")s+=10;
    else if(v.tr==="city"&&ans.terrain!=="city")s-=15;

    if(ans.fuel==="any"||v.fl===ans.fuel)s+=10;
    else if(ans.fuel==="electric"&&(v.fl==="hybrid"||v.fl==="electric")){s+=10;r.push("Eco-friendly powertrain");}
    else s-=5;

    const p=ans.priority;
    if(p==="resale"){if(v.rs==="excellent"){s+=15;r.push("Excellent resale value");}else if(v.rs==="good")s+=8;}
    if(p==="safety"){if(v.sf>=5){s+=15;r.push("Top safety rating");}else if(v.sf>=4)s+=8;}
    if(p==="cost"){if(v.mt==="low"){s+=12;r.push("Low maintenance costs");}if(v.co>0&&v.co<=5.5){s+=10;r.push("Excellent fuel economy");}if(v.fl==="electric"){s+=10;r.push("Zero fuel costs");}}
    if(p==="space"){if(v.bt>=450){s+=12;r.push("Generous cargo space");}if(v.se>=7){s+=15;r.push("7-seater capacity");}}
    if(p==="power"){if(v.pw>=140){s+=15;r.push("Strong performance");}else if(v.pw>=100)s+=8;}

    if(ans.tow==="yes"){
      if(v.tp==="bakkie"||(v.tp==="suv"&&v.sz==="l")){s+=15;r.push("Strong towing capability");}
      else if(v.tp==="suv")s+=5;else s-=20;
    }
    return{...v,sc:s,r};
  }).filter(x=>x.sc>0).sort((a,b)=>b.sc-a.sc).slice(0,5);
}

const stars=n=>"\u2605".repeat(n)+"\u2606".repeat(5-n);

                <button key={o.v} onClick={()=>pick(o.v)} style={{display:"flex",alignItems:"center",gap:12,width:"100%",padding:"13px 16px",background:ans[cur.id]===o.v?"#E8A83818":"#0D1117",border:"2px solid "+(ans[cur.id]===o.v?"#E8A838":"#1E2536"),borderRadius:10,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                  <span style={{fontSize:18,width:30,textAlign:"center"}}>{o.e}</span>
                  <span style={{fontSize:13,fontWeight:ans[cur.id]===o.v?700:500,color:ans[cur.id]===o.v?"#E8A838":"#CBD5E1"}}>{o.l}</span>
                  {ans[cur.id]===o.v&&<span style={{marginLeft:"auto",color:"#E8A838"}}>{"\u2713"}</span>}
                </button>
              ))}
            </div>
          </div>
          {Object.keys(ans).length>0&&(<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {Object.entries(ans).map(([k,val])=>{const st=STEPS.find(s=>s.id===k);const o=st?.opts.find(x=>x.v===val);return o?<div key={k} style={{padding:"2px 8px",borderRadius:5,background:"#E8A83812",border:"1px solid #E8A83825",fontSize:9,color:"#E8A838"}}>{o.e} {o.l}</div>:null;})}
          </div>)}
        </div>)}

        {/* DETAIL VIEW */}
        {res&&view==="detail"&&det&&(<div>
          <button onClick={()=>{setView("cards");setDet(null);}} style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",background:"none",border:"1px solid #1E2536",borderRadius:6,color:"#94A3B8",fontSize:10,cursor:"pointer",marginBottom:14,fontFamily:"inherit"}}>{"\u2190"} Back to results</button>
          <div style={{textAlign:"center",marginBottom:18}}>
            <div style={{fontSize:22,fontWeight:700,color:"#E2E8F0"}}>{det.mk} {det.md}</div>
            <div style={{fontSize:12,color:"#64748B"}}>{cap(det.tp)} {"\u00B7"} {cap(det.fl)} {"\u00B7"} {det.se} seats</div>
          </div>
          {[
            {t:"\u{1F4B0} Pricing",items:[["New RRP",fmt(det.pn)],["Est. Used",fmt(det.pu)],["Resale Rating",cap(det.rs)],["Saving (Used vs New)",fmt(det.pn-det.pu)+" ("+Math.round((det.pn-det.pu)/det.pn*100)+"%)"]]},
            {t:"\u26A1 Performance",items:[["Power",det.pw+" kW"],["Fuel",cap(det.fl)],["Consumption",det.fl==="electric"?"N/A (Electric)":det.co+" l/100km"],["Est. Monthly Fuel (1500km)",det.fl==="electric"?"~R450 (electricity)":fmt(Math.round(det.co*15*23.5))]]},
            {t:"\u{1F4E6} Practicality",items:[["Seats",String(det.se)],["Boot/Load",det.bt>0?det.bt+" litres":"Open load bay"],["Body",cap(det.tp)],["Terrain",cap(det.tr)]]},
            {t:"\u{1F527} Ownership",items:[["Maintenance Level",cap(det.mt)],["Safety",stars(det.sf)+" ("+det.sf+"/5)"],["Suited For",det.us.map(u=>u.replace(/_/g," ")).join(", ")],["Annual Insurance Est.",det.pn>800000?"R25K-R40K":det.pn>500000?"R15K-R25K":det.pn>300000?"R10K-R18K":"R6K-R12K"]]},
          ].map((sec,si)=>(
            <div key={si} style={{background:"#131820",borderRadius:10,border:"1px solid #1E2536",marginBottom:10,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid #1E2536",fontSize:13,fontWeight:700,color:"#E2E8F0"}}>{sec.t}</div>
              {sec.items.map(([l,val],ii)=>(
                <div key={ii} style={{display:"flex",justifyContent:"space-between",padding:"9px 14px",borderBottom:ii<sec.items.length-1?"1px solid #1E253640":"none"}}>
                  <span style={{fontSize:11,color:"#94A3B8"}}>{l}</span>
                  <span style={{fontSize:11,fontWeight:600,color:"#E2E8F0",textAlign:"right",maxWidth:"55%"}}>{val}</span>
                </div>
              ))}
            </div>
          ))}
        </div>)}

        {/* RESULTS */}
        {res&&view!=="detail"&&(<div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {["cards","compare"].map(m=>(
              <button key={m} onClick={()=>setView(m)} style={{flex:1,padding:"9px",borderRadius:8,border:"2px solid "+(view===m?"#E8A838":"#1E2536"),background:view===m?"#E8A83818":"#131820",color:view===m?"#E8A838":"#94A3B8",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                {m==="cards"?"Individual Cards":"Comparison Table"}
              </button>
            ))}
          </div>

          {view==="cards"&&res.map((v,i)=>(
            <div key={i} style={{background:"#131820",borderRadius:14,border:"1px solid #1E2536",overflow:"hidden",marginBottom:12}}>
              <div style={{padding:"14px 16px 10px",borderBottom:"1px solid #1E2536",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:7,background:"#E8A83820",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#E8A838",fontFamily:"monospace"}}>{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#E2E8F0"}}>{v.mk} {v.md}</div>
                  <div style={{fontSize:10,color:"#64748B"}}>{cap(v.tp)} {"\u00B7"} {fc[v.fl]||""} {cap(v.fl)} {"\u00B7"} {v.se} seats</div>
                </div>
              </div>
              <div style={{padding:"10px 16px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                <div><div style={{fontSize:9,color:"#64748B",textTransform:"uppercase",letterSpacing:1}}>New</div><div style={{fontSize:13,fontWeight:700,color:"#E2E8F0"}}>{fmt(v.pn)}</div></div>
                <div><div style={{fontSize:9,color:"#64748B",textTransform:"uppercase",letterSpacing:1}}>Used Est.</div><div style={{fontSize:13,fontWeight:700,color:"#5BBD72"}}>{fmt(v.pu)}</div></div>
                <div><div style={{fontSize:9,color:"#64748B",textTransform:"uppercase",letterSpacing:1}}>Fuel</div><div style={{fontSize:12,fontWeight:600,color:"#CBD5E1"}}>{v.fl==="electric"?"Electric":v.co+" l/100km"}</div></div>
                <div><div style={{fontSize:9,color:"#64748B",textTransform:"uppercase",letterSpacing:1}}>Power</div><div style={{fontSize:12,fontWeight:600,color:"#CBD5E1"}}>{v.pw} kW</div></div>
              </div>
              <div style={{padding:"6px 16px 12px",display:"flex",gap:5,flexWrap:"wrap"}}>
                <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,background:rc[v.rs]+"20",color:rc[v.rs]}}>Resale: {v.rs}</span>
                <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,background:mc[v.mt]+"20",color:mc[v.mt]}}>Maint: {v.mt}</span>
                <span style={{padding:"2px 7px",borderRadius:4,fontSize:9,fontWeight:600,background:"#4A90D920",color:"#4A90D9"}}>Safety: {stars(v.sf)}</span>
              </div>
              {v.r&&v.r.length>0&&<div style={{padding:"0 16px 10px"}}>{v.r.slice(0,3).map((r,ri)=>(<div key={ri} style={{fontSize:10,color:"#94A3B8",lineHeight:1.7}}><span style={{color:"#E8A838",fontSize:7}}>{"\u25CF"}</span> {r}</div>))}</div>}
              <button onClick={()=>{setDet(v);setView("detail");}} style={{width:"100%",padding:"10px",background:"#E8A83815",border:"none",borderTop:"1px solid #1E2536",color:"#E8A838",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>View Full Details</button>
            </div>
          ))}

          {view==="compare"&&(<div style={{overflowX:"auto",borderRadius:12,border:"1px solid #1E2536"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr style={{background:"#1A1F2E"}}>
                <th style={{padding:"10px 12px",textAlign:"left",color:"#64748B",fontWeight:600,fontSize:9,textTransform:"uppercase",letterSpacing:1,borderBottom:"1px solid #1E2536",position:"sticky",left:0,background:"#1A1F2E",zIndex:1,minWidth:90}}>Spec</th>
                {res.map((v,i)=>(<th key={i} style={{padding:"10px",textAlign:"center",color:"#E8A838",fontWeight:700,borderBottom:"1px solid #1E2536",fontSize:11,minWidth:110}}>{v.mk}<br/><span style={{fontWeight:500,color:"#CBD5E1"}}>{v.md}</span></th>))}
              </tr></thead>
              <tbody>{[
                {l:"Type",f:v=>cap(v.tp)},{l:"New Price",f:v=>fmt(v.pn)},{l:"Used Est.",f:v=>fmt(v.pu)},
                {l:"Fuel",f:v=>cap(v.fl)},{l:"Consumption",f:v=>v.fl==="electric"?"Electric":v.co+" l/100km"},{l:"Power",f:v=>v.pw+" kW"},
                {l:"Seats",f:v=>String(v.se)},{l:"Boot",f:v=>v.bt>0?v.bt+"L":"Load bay"},
                {l:"Safety",f:v=>stars(v.sf)},{l:"Resale",f:v=>cap(v.rs)},{l:"Maintenance",f:v=>cap(v.mt)},
                {l:"Monthly Fuel*",f:v=>v.fl==="electric"?"~R450":fmt(Math.round(v.co*15*23.5))},
              ].map((row,ri)=>(
                <tr key={ri} style={{background:ri%2===0?"#0D1117":"#131820"}}>
                  <td style={{padding:"8px 12px",color:"#94A3B8",fontWeight:600,fontSize:10,borderBottom:"1px solid #1E253640",position:"sticky",left:0,background:ri%2===0?"#0D1117":"#131820",zIndex:1}}>{row.l}</td>
                  {res.map((v,i)=>(<td key={i} style={{padding:"8px 12px",textAlign:"center",color:"#E2E8F0",borderBottom:"1px solid #1E253640",fontSize:11}}>{row.f(v)}</td>))}
                </tr>
              ))}</tbody>
            </table>
            <div style={{padding:"6px 12px",fontSize:8,color:"#475569",textAlign:"right"}}>*Based on 1,500km/month at R23.50/litre</div>
          </div>)}

          {res.length===0&&(<div style={{textAlign:"center",padding:"36px 18px",background:"#131820",borderRadius:14,border:"1px solid #1E2536"}}>
            <div style={{fontSize:32,marginBottom:10}}>{"\u{1F914}"}</div>
            <div style={{fontSize:15,fontWeight:700,color:"#E2E8F0",marginBottom:4}}>No exact matches</div>
            <div style={{fontSize:12,color:"#64748B"}}>Try adjusting your budget or terrain preference.</div>
          </div>)}

          <div style={{textAlign:"center",marginTop:20}}>
            <button onClick={restart} style={{padding:"10px 24px",background:"none",border:"2px solid #E8A83850",borderRadius:10,color:"#E8A838",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Start Over</button>
          </div>
        </div>)}

        <div style={{marginTop:24,padding:"12px",background:"#131820",borderRadius:10,border:"1px solid #1E2536",textAlign:"center"}}>
          <div style={{fontSize:9,color:"#475569",lineHeight:1.6}}>
            Piet SA Vehicle Intelligence {"\u2022"} {V.length} vehicles in database {"\u2022"} Prices are estimates & may vary<br/>
            EM Solutions {"\u00B7"} Bruce Wade {"\u2014"} The AI Thinking Specialist
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
